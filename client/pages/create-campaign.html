<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Campaign - KindHeart</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card auth-card-lg">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-heart"></i>
                    <span>KindHeart</span>
                </div>
                <h1>Create Campaign</h1>
                <p>Start your fundraising journey</p>
            </div>

            <form id="createCampaignForm" class="auth-form">
                <div class="form-group">
                    <label for="title">
                        <i class="fas fa-bullhorn"></i> Campaign Title
                    </label>
                    <input type="text" id="title" name="title" placeholder="Enter campaign title" required>
                </div>

                <div class="form-group">
                    <label for="category">
                        <i class="fas fa-tag"></i> Category
                    </label>
                    <select id="category" name="category" required>
                        <option value="">Select a category</option>
                        <option value="Health">Health</option>
                        <option value="Education">Education</option>
                        <option value="Business">Business</option>
                        <option value="Charity">Charity</option>
                        <option value="Emergency">Emergency</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="goal">
                        <i class="fas fa-money-bill"></i> Goal Amount (₦)
                    </label>
                    <input type="number" id="goal" name="goal" placeholder="Enter goal amount" min="1000" required>
                </div>

                <div class="form-group">
                    <label for="description">
                        <i class="fas fa-align-left"></i> Description
                    </label>
                    <textarea id="description" name="description" placeholder="Tell your story..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="image">
                        <i class="fas fa-image"></i> Campaign Image (Optional)
                    </label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="createBtn">
                    <i class="fas fa-rocket"></i> Create Campaign
                </button>

                <a href="my-campaigns.html" class="back-home">
                    <i class="fas fa-arrow-left"></i> Back to My Campaigns
                </a>
            </form>
        </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/create-campaign.js"></script>

</body>
</html>
