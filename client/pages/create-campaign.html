<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Campaign - KindHeart</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" style="max-width: 600px;">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-heart"></i>
                    <span>KindHeart</span>
                </div>
                <h1>Create Campaign</h1>
                <p>Start your fundraising journey</p>
            </div>

            <form id="createCampaignForm" class="auth-form">
                <div class="form-group">
                    <label for="title">
                        <i class="fas fa-bullhorn"></i> Campaign Title
                    </label>
                    <input type="text" id="title" name="title" placeholder="Enter campaign title" required>
                </div>

                <div class="form-group">
                    <label for="category">
                        <i class="fas fa-tag"></i> Category
                    </label>
                    <select id="category" name="category" required>
                        <option value="">Select a category</option>
                        <option value="Health">Health</option>
                        <option value="Education">Education</option>
                        <option value="Business">Business</option>
                        <option value="Charity">Charity</option>
                        <option value="Emergency">Emergency</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="goal">
                        <i class="fas fa-money-bill"></i> Goal Amount (₦)
                    </label>
                    <input type="number" id="goal" name="goal" placeholder="Enter goal amount" min="1000" required>
                </div>

                <div class="form-group">
                    <label for="description">
                        <i class="fas fa-align-left"></i> Description
                    </label>
                    <textarea id="description" name="description" placeholder="Tell your story..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="image">
                        <i class="fas fa-image"></i> Campaign Image (Optional)
                    </label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="createBtn">
                    <i class="fas fa-rocket"></i> Create Campaign
                </button>

                <a href="my-campaigns.html" class="back-home">
                    <i class="fas fa-arrow-left"></i> Back to My Campaigns
                </a>
            </form>
        </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script>
        // Check authentication
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }

        // Load categories
        async function loadCategories() {
            try {
                const response = await fetch(API.CATEGORIES);
                const data = await response.json();
                
                if (data.success) {
                    const select = document.getElementById('category');
                    select.innerHTML = '<option value="">Select a category</option>';
                    
                    data.data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.name;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        // Handle form submission
        document.getElementById('createCampaignForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('createBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('title', document.getElementById('title').value);
                formData.append('category_id', document.getElementById('category').value);
                formData.append('goal_amount', document.getElementById('goal').value);
                formData.append('description', document.getElementById('description').value);
                
                const imageFile = document.getElementById('image').files[0];
                if (imageFile) {
                    formData.append('image', imageFile);
                }

                const response = await fetch(API.CAMPAIGNS, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    alert('Campaign created successfully!');
                    window.location.href = 'my-campaigns.html';
                } else {
                    alert(data.message || 'Failed to create campaign');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error creating campaign. Please try again.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Initialize
        loadCategories();
    </script>
</body>
</html>
