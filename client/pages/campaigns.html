<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Campaigns - KindHeart</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../assets/image/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/campaign.css">
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="../index.html" class="logo-header-link">
                        <img src="../assets/image/favicon.svg" alt="KindHeart" width="32" height="32" class="logo-header-img">
                        <span>KindHeart</span>
                    </a>
                </div>
                
                <ul class="nav-links" id="navLinks">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="campaigns.html" class="active">Campaigns</a></li>
                    <li><a href="how-it-works.html">How It Works</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>

                <div class="nav-actions" id="navActions">
                    <!-- Will be populated by JavaScript -->
                </div>

                <button class="mobile-toggle" id="mobileToggle" title="Toggle navigation menu" aria-label="Toggle navigation menu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- PAGE HEADER -->
    <section class="page-header">
        <div class="container">
            <h1>Browse Campaigns</h1>
            <p>Discover stories that matter and join a community of changemakers</p>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <section style="padding: 3rem 0; background: var(--gray-lightest);">
        <div class="container">
            <div style="display: grid; grid-template-columns: 250px 1fr; gap: 2rem; margin-bottom: 2rem;">
                
                <!-- SIDEBAR FILTERS -->
                <aside class="filters-sidebar">
                    <div class="filter-group">
                        <h3 class="filter-title"><i class="fas fa-filter"></i> CATEGORY</h3>
                        <div class="filter-options">
                            <label class="filter-checkbox">
                                <input type="checkbox" id="catAll" checked data-category="">
                                <span class="checkbox-label">All Categories</span>
                            </label>
                            <label class="filter-checkbox">
                                <input type="checkbox" class="categoryCheck" data-category="Health">
                                <span class="checkbox-label">Health</span>
                            </label>
                            <label class="filter-checkbox">
                                <input type="checkbox" class="categoryCheck" data-category="Education">
                                <span class="checkbox-label">Education</span>
                            </label>
                            <label class="filter-checkbox">
                                <input type="checkbox" class="categoryCheck" data-category="Technology">
                                <span class="checkbox-label">Technology</span>
                            </label>
                            <label class="filter-checkbox">
                                <input type="checkbox" class="categoryCheck" data-category="Community">
                                <span class="checkbox-label">Community</span>
                            </label>
                            <label class="filter-checkbox">
                                <input type="checkbox" class="categoryCheck" data-category="Emergency">
                                <span class="checkbox-label">Emergency</span>
                            </label>
                        </div>
                    </div>

                    <div class="filter-group" style="margin-top: 2rem;">
                        <h3 class="filter-title"><i class="fas fa-coins"></i> GOAL RANGE</h3>
                        <div class="range-input">
                            <input type="range" min="0" max="1000000000" value="1000000000" id="goalRange" class="range-slider">
                            <p class="range-value">₦0 - ₦<span id="goalValue">1,000,000,000</span></p>
                        </div>
                    </div>

                    <div class="filter-group" style="margin-top: 2rem;">
                        <h3 class="filter-title"><i class="fas fa-check-circle"></i> CAMPAIGN STATUS</h3>
                        <div class="filter-options">
                            <label class="filter-checkbox">
                                <input type="checkbox" class="statusCheck" data-status="active">
                                <span class="checkbox-label">Active</span>
                            </label>
                            <label class="filter-checkbox">
                                <input type="checkbox" class="statusCheck" data-status="near_goal">
                                <span class="checkbox-label">Near Goal</span>
                            </label>
                        </div>
                    </div>

                    <button id="resetFilters" class="btn-reset-filters">
                        <i class="fas fa-redo"></i> Reset Filters
                    </button>
                </aside>

                <!-- MAIN CAMPAIGNS AREA -->
                <div>
                    <!-- Search & Sort -->
                    <div class="flex-gap-lg align-center mb-2">
                        <div style="flex: 1; position: relative;">
                            <i class="fas fa-search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray);"></i>
                            <input type="text" id="searchInput" placeholder="Search campaigns..." style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--gray-lighter); border-radius: var(--radius-md); font-size: 1rem;">
                        </div>
                        <select id="sortFilter" style="padding: 0.75rem 1rem; border: 1px solid var(--gray-lighter); border-radius: var(--radius-md); background: var(--white); cursor: pointer; min-width: 150px;">
                            <option value="recent">Newest</option>
                            <option value="popular">Most Popular</option>
                            <option value="ending">Ending Soon</option>
                        </select>
                    </div>

                    <!-- CAMPAIGNS GRID -->
                    <div class="campaigns-grid" id="campaignsGrid">
                        <div class="loading-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Loading campaigns...</p>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div id="pagination" class="flex-gap-xs justify-center mt-2">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/campaigns.js"></script>
  <script src="../assets/js/footer.js"></script>
</body>
</html>
