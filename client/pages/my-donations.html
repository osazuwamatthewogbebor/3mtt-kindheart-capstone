<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Donations - KindHeart</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/profile.css">
<link rel="stylesheet" href="../assets/css/donations.css">
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="../index.html">
                        <i class="fas fa-heart"></i>
                        <span>KindHeart</span>
                    </a>
                </div>
                
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="campaigns.html">Campaigns</a></li>
                    <li><a href="my-campaigns.html">My Campaigns</a></li>
                </ul>

                <div class="nav-actions">
                    <div class="user-menu">
                        <button class="user-btn" onclick="toggleUserMenu()">
                            <i class="fas fa-user-circle"></i> <span id="userName">User</span>
                        </button>
                        <div class="user-dropdown" id="userDropdown">
                            <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
                            <a href="my-donations.html"><i class="fas fa-heart"></i> My Donations</a>
                            <a href="dashboard.html" id="adminLink" class="hidden"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- PAGE HEADER -->
    <section class="page-header">
        <div class="container">
            <h1>My Donations</h1>
            <p>Track your contributions and make a difference</p>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <section class="p-3 bg-gray-lightest" style="min-height: 60vh;">
        <div class="container">
            
            <!-- STATS -->
            <div class="stats-row">
                <div class="stat-box">
                    <h3 id="totalDonations">0</h3>
                    <p>Total Donations</p>
                </div>
                <div class="stat-box">
                    <h3 id="totalAmount">₦0</h3>
                    <p>Total Amount</p>
                </div>
                <div class="stat-box">
                    <h3 id="campaignsSupported">0</h3>
                    <p>Campaigns Supported</p>
                </div>
            </div>

            <!-- DONATIONS TABLE -->
            <div class="donations-table">
                <div class="table-header">
                    <h2>Donation History</h2>
                </div>

                <div id="donationsList">
                    <div class="loading-state" style="padding: 3rem;">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading your donations...</p>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 KindHeart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../assets/js/config.js"></script>
    <script>
        // Check authentication
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }

        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            document.getElementById('userName').textContent = user.name;
            if (user.role === 'ADMIN') {
                document.getElementById('adminLink').style.display = 'flex';
            }
        }

        function toggleUserMenu() {
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('show');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.user-menu')) {
                const dropdown = document.getElementById('userDropdown');
                if (dropdown) dropdown.classList.remove('show');
            }
        });

        // Load donations
        async function loadDonations() {
            try {
                const response = await fetch(API.MY_DONATIONS, {
                    headers: getAuthHeaders()
                });
                const data = await response.json();
                
                const container = document.getElementById('donationsList');
                
                if (!data.success || data.data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-heart-broken"></i>
                            <h3>No Donations Yet</h3>
                            <p>Start supporting campaigns and make a difference today!</p>
                            <a href="campaigns.html" class="btn btn-primary btn-lg">
                                <i class="fas fa-search"></i> Browse Campaigns
                            </a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '';

                // Calculate stats
                let totalAmount = 0;
                let successfulDonations = 0;
                const uniqueCampaigns = new Set();

                data.data.forEach(donation => {
                    const status = donation.paymentStatus || donation.payment_status;
                    if (status === 'SUCCESS') {
                        totalAmount += parseFloat(donation.amount);
                        successfulDonations++;
                    }
                    uniqueCampaigns.add(donation.campaignId || donation.campaign_id);

                    const statusClass = status === 'SUCCESS' ? 'success' : 
                                      status === 'PENDING' ? 'pending' : 'failed';
                    
                    const row = document.createElement('div');
                    row.className = 'donation-row';
                    row.innerHTML = `
                        <div class="campaign-info">
                            <h4>${donation.campaignTitle || donation.campaign_title}</h4>
                            <p>Reference: ${donation.paymentReference || donation.payment_reference}</p>
                        </div>
                        <div class="donation-amount">${formatCurrency(donation.amount)}</div>
                        <div class="donation-date">${formatDate(donation.createdAt || donation.created_at)}</div>
                        <div>
                            <span class="status-badge ${statusClass}">
                                <i class="fas ${statusClass === 'success' ? 'fa-check-circle' : 
                                               statusClass === 'pending' ? 'fa-clock' : 'fa-times-circle'}"></i>
                                ${status}
                            </span>
                        </div>
                    `;
                    
                    container.appendChild(row);
                });

                // Update stats
                document.getElementById('totalDonations').textContent = successfulDonations;
                document.getElementById('totalAmount').textContent = formatCurrency(totalAmount);
                document.getElementById('campaignsSupported').textContent = uniqueCampaigns.size;
                
            } catch (error) {
                console.error('Error loading donations:', error);
                document.getElementById('donationsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Donations</h3>
                        <p>Please try again later.</p>
                    </div>
                `;
            }
        }

        // Initialize
        loadDonations();
    </script>
</body>
</html>
