<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Donations - KindHeart</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 0;
            text-align: center;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .user-menu {
            position: relative;
        }

        .user-btn {
            background: none;
            border: none;
            color: var(--gray);
            font-weight: 500;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .user-btn:hover {
            background: var(--gray-lightest);
            color: var(--primary);
        }

        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            padding: 0.5rem;
            min-width: 200px;
            display: none;
            z-index: 1000;
            margin-top: 0.5rem;
        }

        .user-dropdown.show {
            display: block;
        }

        .user-dropdown a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--dark);
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .user-dropdown a:hover {
            background: var(--gray-lightest);
            color: var(--primary);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .stat-box {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-lightest);
            text-align: center;
        }

        .stat-box h3 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-box p {
            color: var(--gray);
        }

        .donations-table {
            background: white;
            border-radius: var(--radius-xl);
            border: 1px solid var(--gray-lightest);
            overflow: hidden;
        }

        .table-header {
            padding: 1.5rem 2rem;
            background: var(--gray-lightest);
            border-bottom: 1px solid var(--gray-lighter);
        }

        .table-header h2 {
            font-size: 1.5rem;
            color: var(--dark);
        }

        .donation-row {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--gray-lightest);
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 1rem;
            align-items: center;
            transition: var(--transition);
        }

        .donation-row:hover {
            background: var(--gray-lightest);
        }

        .donation-row:last-child {
            border-bottom: none;
        }

        .campaign-info h4 {
            color: var(--dark);
            margin-bottom: 0.25rem;
            font-size: 1.0625rem;
        }

        .campaign-info p {
            color: var(--gray);
            font-size: 0.875rem;
        }

        .donation-amount {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .donation-date {
            color: var(--gray);
            font-size: 0.9375rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .status-badge.success {
            background: #dcfce7;
            color: #059669;
        }

        .status-badge.pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-badge.failed {
            background: #fee2e2;
            color: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--gray-lighter);
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--gray);
            margin-bottom: 1.5rem;
        }

        @media (max-width: 768px) {
            .donation-row {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="../index.html">
                        <i class="fas fa-heart"></i>
                        <span>KindHeart</span>
                    </a>
                </div>
                
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="campaigns.html">Campaigns</a></li>
                    <li><a href="my-campaigns.html">My Campaigns</a></li>
                </ul>

                <div class="nav-actions">
                    <div class="user-menu">
                        <button class="user-btn" onclick="toggleUserMenu()">
                            <i class="fas fa-user-circle"></i> <span id="userName">User</span>
                        </button>
                        <div class="user-dropdown" id="userDropdown">
                            <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
                            <a href="my-donations.html"><i class="fas fa-heart"></i> My Donations</a>
                            <a href="dashboard.html" id="adminLink" style="display: none;"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- PAGE HEADER -->
    <section class="page-header">
        <div class="container">
            <h1>My Donations</h1>
            <p>Track your contributions and make a difference</p>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <section style="padding: 3rem 0; background: var(--gray-lightest); min-height: 60vh;">
        <div class="container">
            
            <!-- STATS -->
            <div class="stats-row">
                <div class="stat-box">
                    <h3 id="totalDonations">0</h3>
                    <p>Total Donations</p>
                </div>
                <div class="stat-box">
                    <h3 id="totalAmount">₦0</h3>
                    <p>Total Amount</p>
                </div>
                <div class="stat-box">
                    <h3 id="campaignsSupported">0</h3>
                    <p>Campaigns Supported</p>
                </div>
            </div>

            <!-- DONATIONS TABLE -->
            <div class="donations-table">
                <div class="table-header">
                    <h2>Donation History</h2>
                </div>

                <div id="donationsList">
                    <div class="loading-state" style="padding: 3rem;">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading your donations...</p>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 KindHeart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../assets/js/config.js"></script>
    <script>
        // Check authentication
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }

        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            document.getElementById('userName').textContent = user.name;
            if (user.role === 'ADMIN') {
                document.getElementById('adminLink').style.display = 'flex';
            }
        }

        function toggleUserMenu() {
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('show');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.user-menu')) {
                const dropdown = document.getElementById('userDropdown');
                if (dropdown) dropdown.classList.remove('show');
            }
        });

        // Load donations
        async function loadDonations() {
            try {
                const response = await fetch(API.MY_DONATIONS, {
                    headers: getAuthHeaders()
                });
                const data = await response.json();
                
                const container = document.getElementById('donationsList');
                
                if (!data.success || data.data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-heart-broken"></i>
                            <h3>No Donations Yet</h3>
                            <p>Start supporting campaigns and make a difference today!</p>
                            <a href="campaigns.html" class="btn btn-primary btn-lg">
                                <i class="fas fa-search"></i> Browse Campaigns
                            </a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '';

                // Calculate stats
                let totalAmount = 0;
                let successfulDonations = 0;
                const uniqueCampaigns = new Set();

                data.data.forEach(donation => {
                    if (donation.payment_status === 'SUCCESS') {
                        totalAmount += parseFloat(donation.amount);
                        successfulDonations++;
                    }
                    uniqueCampaigns.add(donation.campaign_id);

                    const statusClass = donation.payment_status === 'SUCCESS' ? 'success' : 
                                      donation.payment_status === 'PENDING' ? 'pending' : 'failed';
                    
                    const row = document.createElement('div');
                    row.className = 'donation-row';
                    row.innerHTML = `
                        <div class="campaign-info">
                            <h4>${donation.campaign_title}</h4>
                            <p>Reference: ${donation.payment_reference}</p>
                        </div>
                        <div class="donation-amount">${formatCurrency(donation.amount)}</div>
                        <div class="donation-date">${formatDate(donation.created_at)}</div>
                        <div>
                            <span class="status-badge ${statusClass}">
                                <i class="fas ${statusClass === 'success' ? 'fa-check-circle' : 
                                               statusClass === 'pending' ? 'fa-clock' : 'fa-times-circle'}"></i>
                                ${donation.payment_status}
                            </span>
                        </div>
                    `;
                    
                    container.appendChild(row);
                });

                // Update stats
                document.getElementById('totalDonations').textContent = successfulDonations;
                document.getElementById('totalAmount').textContent = formatCurrency(totalAmount);
                document.getElementById('campaignsSupported').textContent = uniqueCampaigns.size;
                
            } catch (error) {
                console.error('Error loading donations:', error);
                document.getElementById('donationsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Donations</h3>
                        <p>Please try again later.</p>
                    </div>
                `;
            }
        }

        // Initialize
        loadDonations();
    </script>
</body>
</html>
