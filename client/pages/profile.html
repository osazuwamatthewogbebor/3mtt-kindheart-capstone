<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - KindHeart</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/profile.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../assets/image/favicon.svg">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="nav-wrapper">
        <div class="logo"><a href="../index.html"><i class="fas fa-heart"></i><span>KindHeart</span></a></div>
        <ul class="nav-links"><li><a href="../index.html">Home</a></li><li><a href="campaigns.html">Campaigns</a></li><li><a href="user-dashboard.html#campaigns">My Campaigns</a></li><li><a href="user-dashboard.html#donations">My Donations</a></li></ul>
        <div class="nav-actions"><button class="btn btn-primary" onclick="logout()">Logout</button></div>
      </div>
    </div>
  </nav>

  <section class="profile-hero" style="background-image: linear-gradient(135deg, rgba(16,185,129,0.87), rgba(52,211,153,0.38)), url('https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=1200&q=80');">
    <div class="container profile-hero-inner">
      <div class="profile-avatar" id="profileAvatar">K</div>
      <div>
        <span class="subtitle">Your profile</span>
        <h1 id="profileName">Loading...</h1>
        <p id="profileEmail">user@example.com</p>
      </div>
      <div class="hero-actions"><a href="user-dashboard.html#campaigns" class="btn btn-outline">My Campaigns</a><a href="user-dashboard.html#donations" class="btn btn-primary">My Donations</a></div>
    </div>
  </section>

  <main class="container profile-main">
    <div class="stats-grid">
      <div class="stat-card"><h3 id="totalCampaigns">0</h3><p>Campaigns</p></div>
      <div class="stat-card"><h3 id="totalDonations">0</h3><p>Donations</p></div>
      <div class="stat-card"><h3 id="totalRaised">₦0</h3><p>Raised</p></div>
      <div class="stat-card"><h3 id="totalDonated">₦0</h3><p>Donated</p></div>
    </div>

    <section class="profile-card">
      <div class="profile-card-header"><h2>Account details</h2><button class="btn btn-outline" onclick="toggleEdit('info')"><i class="fas fa-edit"></i> Edit</button></div>
      <div id="infoView" class="profile-info-view">
        <div class="info-row"><span>Name</span><strong id="displayName">-</strong></div>
        <div class="info-row"><span>Email</span><strong id="displayEmail">-</strong></div>
        <div class="info-row"><span>Role</span><strong id="displayRole">-</strong></div>
        <div class="info-row"><span>Joined</span><strong id="displayJoined">-</strong></div>
      </div>
      <div id="infoEdit" class="hidden">
        <form id="updateProfileForm">
          <div class="form-group"><label for="editName">Full Name</label><input type="text" id="editName" required></div>
          <div class="form-group"><label for="editEmail">Email Address</label><input type="email" id="editEmail" required></div>
          <div class="profile-form-actions"><button type="button" class="btn btn-outline" onclick="toggleEdit('info')">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>
        </form>
      </div>
    </section>

    <section class="profile-card">
      <div class="profile-card-header"><h2>Change password</h2><button class="btn btn-outline" onclick="toggleEdit('password')"><i class="fas fa-key"></i> Update</button></div>
      <div id="passwordView" class="profile-info-view"><p>************</p></div>
      <div id="passwordEdit" class="hidden">
        <form id="changePasswordForm">
          <div class="form-group"><label for="currentPassword">Current password</label><input type="password" id="currentPassword" minlength="8" required></div>
          <div class="form-group"><label for="newPassword">New password</label><input type="password" id="newPassword" minlength="8" required></div>
          <div class="form-group"><label for="confirmPassword">Confirm new password</label><input type="password" id="confirmPassword" minlength="8" required></div>
          <div class="profile-form-actions"><button type="button" class="btn btn-outline" onclick="toggleEdit('password')">Cancel</button><button type="submit" class="btn btn-primary">Update password</button></div>
        </form>
      </div>
    </section>
  </main>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/profile.js"></script>
  <script src="../assets/js/footer.js"></script>
</body>
</html>
