<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Details - KindHeart</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../assets/image/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/campaign.css">
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="../index.html" class="campaign-header-logo">
                        <img src="../assets/image/favicon.svg" alt="KindHeart" width="32" height="32">
                        <span>KindHeart</span>
                    </a>
                </div>
                
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="campaigns.html">Campaigns</a></li>
                    <li><a href="how-it-works.html">How It Works</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>

                <div class="nav-actions" id="navActions">
                    <a href="login.html" class="btn-link">Login</a>
                    <a href="register.html" class="btn btn-primary">Get Started</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- CAMPAIGN HEADER -->
    <section class="campaign-header">
        <div class="container">
            <a href="campaigns.html" class="btn-link mb-1 d-inline-block">
                <i class="fas fa-arrow-left"></i> Back to Campaigns
            </a>
            <h1 id="campaignTitle" class="mb-1 campaign-title-large">Loading...</h1>
            <div class="d-flex gap-1 align-center campaign-meta">
                <span class="campaign-category" id="campaignCategory">Category</span>
                <span class="color-gray">
                    <i class="fas fa-user"></i> By <span id="creatorName">Creator</span>
                </span>
                <span class="color-gray">
                    <i class="fas fa-calendar"></i> <span id="createdDate">Date</span>
                </span>
            </div>
        </div>
    </section>

    <!-- CAMPAIGN HERO -->
    <section class="p-3 bg-gray-lightest">
        <div class="container">
            <div class="campaign-hero">
                <div>
                    <img id="campaignImage" src="https://via.placeholder.com/800x500" alt="Campaign" class="campaign-image-large">
                </div>

                <div class="campaign-sidebar">
                    <div class="amount-raised" id="amountRaised">₦0</div>
                    <div class="goal-text">raised of <span id="goalAmount">₦0</span> goal</div>
                    
                    <div class="progress-bar mb-1">
                        <div class="progress-fill" id="progressBar"></div>
                    </div>

                    <button class="btn btn-primary donate-btn" id="donateButton">
                        <i class="fas fa-heart"></i> Donate Now
                    </button>

                    <div class="donors-count">
                        <strong id="donorsCount">0</strong>
                        <span class="color-gray">donors</span>
                    </div>

                    <div class="share-section">
                        <h4>Share this campaign</h4>
                        <div class="share-buttons">
                            <button class="share-btn facebook" id="shareFacebook" title="Share on Facebook">
                                <i class="fab fa-facebook"></i>
                            </button>
                            <button class="share-btn twitter" id="shareTwitter" title="Share on Twitter">
                                <i class="fab fa-twitter"></i>
                            </button>
                            <button class="share-btn whatsapp" id="shareWhatsapp" title="Share on WhatsApp">
                                <i class="fab fa-whatsapp"></i>
                            </button>
                            <button class="share-btn copy" id="shareCopy" title="Copy link">
                                <i class="fas fa-link"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- CAMPAIGN CONTENT -->
    <section class="p-3">
        <div class="container">
            <div class="campaign-content">
                <div class="campaign-tabs">
                    <button class="tab active" id="storyTab-btn" data-tab="story">Story</button>
                    <button class="tab" id="donationsTab-btn" data-tab="donations">Donations (<span id="donationsCount">0</span>)</button>
                    <button class="tab" id="updatesTab-btn" data-tab="updates">Updates</button>
                </div>

                <!-- STORY TAB -->
                <div class="tab-content active" id="storyTab">
                    <div class="creator-info">
                        <div class="creator-avatar" id="creatorAvatar">A</div>
                        <div class="creator-details">
                            <h4 id="creatorNameFull">Campaign Creator</h4>
                            <p>Campaign Organizer</p>
                        </div>
                    </div>

                    <div id="campaignDescription" class="campaign-description-text">
                        Loading campaign details...
                    </div>
                </div>

                <!-- DONATIONS TAB -->
                <div class="tab-content" id="donationsTab">
                    <div id="donationsList">
                        <div class="loading-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Loading donations...</p>
                        </div>
                    </div>
                </div>

                <!-- UPDATES TAB -->
                <div class="tab-content" id="updatesTab">
                    <div class="loading-state">
                        <i class="fas fa-bell opacity-30 icon-lg"></i>
                        <p>No updates yet</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/campaign-details.js"></script>

  <script src="../assets/js/footer.js"></script>
</body>
</html>
