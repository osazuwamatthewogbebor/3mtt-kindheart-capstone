<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Campaign - KindHeart</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" style="max-width: 600px;">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-heart"></i>
                    <span>KindHeart</span>
                </div>
                <h1>Edit Campaign</h1>
                <p>Update your campaign details</p>
            </div>

            <form id="editCampaignForm" class="auth-form">
                <div class="form-group">
                    <label for="title">
                        <i class="fas fa-bullhorn"></i> Campaign Title
                    </label>
                    <input type="text" id="title" name="title" placeholder="Enter campaign title" required>
                </div>

                <div class="form-group">
                    <label for="category">
                        <i class="fas fa-tag"></i> Category
                    </label>
                    <select id="category" name="category" required>
                        <option value="">Loading categories...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="goal">
                        <i class="fas fa-money-bill"></i> Goal Amount (₦)
                    </label>
                    <input type="number" id="goal" name="goal" placeholder="Enter goal amount" min="1000" required>
                </div>

                <div class="form-group">
                    <label for="status">
                        <i class="fas fa-toggle-on"></i> Status
                    </label>
                    <select id="status" name="status" required>
                        <option value="ACTIVE">Active</option>
                        <option value="PAUSED">Paused</option>
                        <option value="COMPLETED">Completed</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">
                        <i class="fas fa-align-left"></i> Description
                    </label>
                    <textarea id="description" name="description" placeholder="Tell your story..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="image">
                        <i class="fas fa-image"></i> Update Campaign Image (Optional)
                    </label>
                    <input type="file" id="image" name="image" accept="image/*">
                    <div id="currentImage" style="margin-top: 1rem;"></div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="updateBtn">
                    <i class="fas fa-save"></i> Update Campaign
                </button>

                <a href="my-campaigns.html" class="back-home">
                    <i class="fas fa-arrow-left"></i> Back to My Campaigns
                </a>
            </form>
        </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script>
        // Check authentication
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const campaignId = urlParams.get('id');

        if (!campaignId) {
            alert('Campaign not found');
            window.location.href = 'my-campaigns.html';
        }

        // Load categories
        async function loadCategories() {
            try {
                const response = await fetch(API.CATEGORIES);
                const data = await response.json();
                
                if (data.success) {
                    const select = document.getElementById('category');
                    select.innerHTML = '<option value="">Select a category</option>';
                    
                    data.data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.name;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        // Load campaign data
        async function loadCampaign() {
            try {
                const response = await fetch(`${API.CAMPAIGNS}/${campaignId}`, {
                    headers: getAuthHeaders()
                });
                const data = await response.json();

                if (!data.success) {
                    alert('Campaign not found');
                    window.location.href = 'my-campaigns.html';
                    return;
                }

                const campaign = data.data;

                // Populate form
                document.getElementById('title').value = campaign.title;
                document.getElementById('goal').value = campaign.goal_amount;
                document.getElementById('status').value = campaign.status;
                document.getElementById('description').value = campaign.description;

                // Set category after categories are loaded
                setTimeout(() => {
                    document.getElementById('category').value = campaign.category_id;
                }, 500);

                // Show current image
                if (campaign.image) {
                    document.getElementById('currentImage').innerHTML = `
                        <p style="color: var(--gray); margin-bottom: 0.5rem;">Current image:</p>
                        <img src="${campaign.image}" alt="Current" style="max-width: 200px; border-radius: var(--radius-md);">
                    `;
                }

            } catch (error) {
                console.error('Error loading campaign:', error);
                alert('Error loading campaign');
            }
        }

        // Handle form submission
        document.getElementById('editCampaignForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('updateBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('title', document.getElementById('title').value);
                formData.append('category_id', document.getElementById('category').value);
                formData.append('goal_amount', document.getElementById('goal').value);
                formData.append('status', document.getElementById('status').value);
                formData.append('description', document.getElementById('description').value);
                
                const imageFile = document.getElementById('image').files[0];
                if (imageFile) {
                    formData.append('image', imageFile);
                }

                const response = await fetch(`${API.CAMPAIGNS}/${campaignId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    alert('Campaign updated successfully!');
                    window.location.href = 'my-campaigns.html';
                } else {
                    alert(data.message || 'Failed to update campaign');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error updating campaign. Please try again.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Initialize
        loadCategories();
        loadCampaign();
    </script>
</body>
</html>
